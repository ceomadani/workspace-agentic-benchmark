# ─────────────────────────────────────────────────────────────────────────
# workspace-bench · example GitHub Action TEMPLATE for end users
# ─────────────────────────────────────────────────────────────────────────
#
# THIS IS A TEMPLATE · NOT auto-active on this repo (the benchmark itself).
# This repo is a TOOL (Python package) · NOT a workspace · auto-running the
# benchmark on it produces a low grade by design (you can't measure a meter
# with a meter). Trigger is `workflow_dispatch` so it can be invoked manually
# for documentation/screenshots only.
#
# Copy this file to .github/workflows/workspace-bench.yml in YOUR workspace
# repo (NOT a tool repo) and change the `on:` triggers to:
#
#   on:
#     push:
#       branches: [main]
#     pull_request:
#       branches: [main]
#
# The action then:
#   1. Installs workspace-bench from GitHub
#   2. Audits your repository against the 12-pillar framework
#   3. Uploads audit.json + score.json + report.html as workflow artifacts
#   4. Posts a summary comment on PRs (with grade + cluster averages)
#   5. Fails the build if score regresses below a threshold (optional)
#
# Configuration: edit the GRADE_THRESHOLD env var below.
# ─────────────────────────────────────────────────────────────────────────

name: Workspace Agentic Benchmark

# Manual trigger only on this repo · the example is meant for OTHER workspaces
on:
  workflow_dispatch:

env:
  # Set to A/B/C/D/F or empty to skip threshold check
  GRADE_THRESHOLD: "C"

jobs:
  workspace-bench:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install workspace-bench
        run: |
          pip install git+https://github.com/ceomadani/workspace-agentic-benchmark.git

      - name: Run audit
        id: audit
        run: |
          mkdir -p .workspace-bench
          workspace-bench audit . --output .workspace-bench/audit.json --quiet
          workspace-bench score .workspace-bench/audit.json --output .workspace-bench/score.json --quiet
          workspace-bench report .workspace-bench/score.json --output .workspace-bench/report.html

          # Extract score for downstream steps
          COMPOSITE=$(python -c "import json; print(json.load(open('.workspace-bench/score.json'))['composite'])")
          GRADE=$(python -c "import json; print(json.load(open('.workspace-bench/score.json'))['grade'])")
          echo "composite=$COMPOSITE" >> $GITHUB_OUTPUT
          echo "grade=$GRADE" >> $GITHUB_OUTPUT
          echo ""
          echo "## Workspace Agentic Benchmark · result"
          echo "Composite: $COMPOSITE / 100 · Grade $GRADE"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: workspace-bench-report
          path: .workspace-bench/
          retention-days: 30

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const score = JSON.parse(fs.readFileSync('.workspace-bench/score.json', 'utf8'));
            const composite = score.composite;
            const grade = score.grade;
            const clusters = score.cluster_averages || {};

            const body = [
              '## 🧭 Workspace Agentic Benchmark',
              '',
              `**Composite**: \`${composite.toFixed(2)} / 100\` · **Grade**: \`${grade}\``,
              '',
              '| Cluster | Score |',
              '|---------|------:|',
              ...Object.entries(clusters).map(([k, v]) =>
                `| ${k} · ${v.name || ''} | ${v.average.toFixed(1)} / 100 |`
              ),
              '',
              '<sub>Generated by [workspace-bench](https://github.com/ceomadani/workspace-agentic-benchmark) · download the full HTML report from the workflow artifacts.</sub>',
            ].join('\n');

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });

      - name: Grade threshold check (optional)
        if: env.GRADE_THRESHOLD != ''
        run: |
          GRADE="${{ steps.audit.outputs.grade }}"
          THRESHOLD="${{ env.GRADE_THRESHOLD }}"
          # A > B > C > D > F
          declare -A RANK=( ["A"]=5 ["B"]=4 ["C"]=3 ["D"]=2 ["F"]=1 )
          if [[ ${RANK[$GRADE]} -lt ${RANK[$THRESHOLD]} ]]; then
            echo "::error::Grade $GRADE below threshold $THRESHOLD"
            exit 1
          fi
          echo "✓ Grade $GRADE meets threshold $THRESHOLD"
